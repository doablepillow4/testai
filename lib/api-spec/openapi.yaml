openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Hivemind Predictor API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: market
    description: Market data operations
  - name: predictions
    description: Prediction operations
  - name: simulator
    description: Monte Carlo simulator
  - name: polymarket
    description: Polymarket prediction markets

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /market/prices:
    get:
      operationId: getMarketPrices
      tags: [market]
      summary: Get current prices for all tracked symbols
      responses:
        "200":
          description: Market prices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketPrice"

  /market/history/{symbol}:
    get:
      operationId: getMarketHistory
      tags: [market]
      summary: Get historical price data for a symbol
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Historical price data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketHistory"

  /predictions:
    get:
      operationId: getPredictions
      tags: [predictions]
      summary: Get all predictions with confidence scores
      responses:
        "200":
          description: List of predictions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prediction"
    post:
      operationId: createPrediction
      tags: [predictions]
      summary: Generate a new Hivemind prediction for a symbol
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePredictionBody"
      responses:
        "201":
          description: Created prediction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prediction"

  /predictions/summary:
    get:
      operationId: getPredictionsSummary
      tags: [predictions]
      summary: Get prediction accuracy summary and self-improvement stats
      responses:
        "200":
          description: Prediction summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictionSummary"

  /simulator/monte-carlo:
    post:
      operationId: runMonteCarlo
      tags: [simulator]
      summary: Run Monte Carlo simulation for event impact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MonteCarloBody"
      responses:
        "200":
          description: Monte Carlo simulation results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonteCarloResult"

  /polymarket/markets:
    get:
      operationId: getPolymarketMarkets
      tags: [polymarket]
      summary: Get top Polymarket prediction markets
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Polymarket markets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PolymarketMarket"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    MarketPrice:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        price:
          type: number
        change:
          type: number
        changePercent:
          type: number
        volume:
          type: number
        marketCap:
          type: number
        type:
          type: string
          enum: [stock, crypto]
        sparkline:
          type: array
          items:
            type: number
        updatedAt:
          type: string
      required: [symbol, name, price, change, changePercent, type, sparkline, updatedAt]

    MarketHistory:
      type: object
      properties:
        symbol:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/PricePoint"
      required: [symbol, data]

    PricePoint:
      type: object
      properties:
        timestamp:
          type: string
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number
      required: [timestamp, close]

    Prediction:
      type: object
      properties:
        id:
          type: integer
        symbol:
          type: string
        direction:
          type: string
          enum: [bullish, bearish, neutral]
        targetPrice:
          type: number
        currentPrice:
          type: number
        confidence:
          type: number
        timeframe:
          type: string
        signals:
          type: array
          items:
            $ref: "#/components/schemas/Signal"
        outcome:
          type: string
          enum: [correct, incorrect, pending]
          nullable: true
        createdAt:
          type: string
        resolvedAt:
          type: string
          nullable: true
      required: [id, symbol, direction, targetPrice, currentPrice, confidence, timeframe, signals, createdAt]

    Signal:
      type: object
      properties:
        name:
          type: string
        value:
          type: number
        weight:
          type: number
        bullish:
          type: boolean
      required: [name, value, weight, bullish]

    CreatePredictionBody:
      type: object
      properties:
        symbol:
          type: string
        timeframe:
          type: string
          default: "7d"
      required: [symbol]

    PredictionSummary:
      type: object
      properties:
        totalPredictions:
          type: integer
        correctPredictions:
          type: integer
        accuracy:
          type: number
        averageConfidence:
          type: number
        recentAccuracy:
          type: number
        improvementTrend:
          type: number
        bySymbol:
          type: array
          items:
            $ref: "#/components/schemas/SymbolAccuracy"
      required: [totalPredictions, correctPredictions, accuracy, averageConfidence, recentAccuracy, improvementTrend, bySymbol]

    SymbolAccuracy:
      type: object
      properties:
        symbol:
          type: string
        total:
          type: integer
        correct:
          type: integer
        accuracy:
          type: number
      required: [symbol, total, correct, accuracy]

    MonteCarloBody:
      type: object
      properties:
        symbol:
          type: string
        currentPrice:
          type: number
        volatility:
          type: number
        eventImpact:
          type: number
        timeHorizon:
          type: integer
        simulations:
          type: integer
          default: 1000
      required: [symbol, currentPrice, volatility, eventImpact, timeHorizon]

    MonteCarloResult:
      type: object
      properties:
        symbol:
          type: string
        simulations:
          type: integer
        median:
          type: number
        mean:
          type: number
        p10:
          type: number
        p25:
          type: number
        p75:
          type: number
        p90:
          type: number
        bullishProbability:
          type: number
        bearishProbability:
          type: number
        paths:
          type: array
          items:
            type: array
            items:
              type: number
      required: [symbol, simulations, median, mean, p10, p25, p75, p90, bullishProbability, bearishProbability, paths]

    PolymarketMarket:
      type: object
      properties:
        id:
          type: string
        question:
          type: string
        category:
          type: string
        yesPrice:
          type: number
        noPrice:
          type: number
        volume:
          type: number
        liquidity:
          type: number
        endDate:
          type: string
        active:
          type: boolean
      required: [id, question, yesPrice, noPrice, active]
